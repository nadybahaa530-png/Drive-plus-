<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X MET - منصة الأفلام الاحترافية</title>
    <style>
        :root {
            --main-color: #00ffcc; /* لون مستقبلي مميز لـ X MET */
            --bg-color: #0a0b10;
            --card-bg: #161922;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        /* الهيدر المحسن مع شريط البحث */
        header {
            background-color: rgba(10, 11, 16, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(10px);
        }

        header .logo {
            font-size: 30px;
            font-weight: 900;
            color: var(--main-color);
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        /* شريط البحث الاحترافي */
        .search-container {
            position: relative;
            width: 40%;
            max-width: 400px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #222;
            background-color: #1a1d26;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .search-container input:focus {
            border-color: var(--main-color);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        /* شبكة الأفلام */
        .container {
            padding: 40px 5%;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 25px;
            border-right: 4px solid var(--main-color);
            padding-right: 12px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        /* كارت الفيلم بتصميم فخم */
        .movie-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.2);
        }

        .movie-card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            display: block;
        }

        .movie-info {
            padding: 15px;
            background: linear-gradient(to top, rgba(10,11,16,1), rgba(10,11,16,0.7));
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .movie-info h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            background-color: var(--main-color);
            color: #000;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">X MET</div>
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="ابحث عن فيلمك المفضل هنا...">
        </div>
    </header>

    <div class="container">
        <h2 class="section-title" id="pageTitle">الأفلام الأكثر شعبية اليوم</h2>
        <div class="movies-grid" id="moviesGrid">
            </div>
    </div>

    <script>
        const apiKey = '8265bd1679663a7ea12ac168da84d2e8'; 
        const imgPath = 'https://image.tmdb.org/t/p/w500';
        
        const grid = document.getElementById('moviesGrid');
        const searchBox = document.getElementById('searchBox');
        const pageTitle = document.getElementById('pageTitle');

        // دالة جلب الأفلام الشعبية (الافتراضية)
        async function getPopularMovies() {
            const url = `https://api.themoviedb.org/3/movie/popular?api_key=${apiKey}&language=ar&page=1`;
            fetchAndDisplay(url);
        }

        // دالة البحث عن الأفلام عند الكتابة
        async function searchMovies(query) {
            const url = `https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${encodeURIComponent(query)}&language=ar`;
            fetchAndDisplay(url);
        }

        // دالة مشتركة لجلب البيانات وعرضها
        async function fetchAndDisplay(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                displayMovies(data.results);
            } catch (error) {
                console.error("حدث خطأ أثناء جلب البيانات:", error);
            }
        }

        function displayMovies(movies) {
            grid.innerHTML = '';
            if (movies.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">لم يتم العثور على نتائج مدمجة بهذا الاسم.</p>';
                return;
            }
            movies.forEach(movie => {
                if(!movie.poster_path) return;
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${imgPath + movie.poster_path}" alt="${movie.title}">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <span class="badge">⭐ ${movie.vote_average.toFixed(1)}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // الاستماع للكتابة داخل مربع البحث
        searchBox.addEventListener('input', (e) => {
            const value = e.target.value;
            if(value && value.trim() !== '') {
                pageTitle.innerText = `نتائج البحث عن: ${value}`;
                searchMovies(value);
            } else {
                pageTitle.innerText = "الأفلام الأكثر شعبية اليوم";
                getPopularMovies();
            }
        });

        // تشغيل الموقع في البداية بالافلام الشائعة
        getPopularMovies();
    </script>
</body>
</html>
